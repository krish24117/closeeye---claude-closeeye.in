<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Close Eye — splash</title>
<link href="https://fonts.cdnfonts.com/css/open-sauce-sans" rel="stylesheet">
<style>
  :root{--forest:#0E2A1F;--cream:#FAF7F2;--lime:#7ED321;--green:#2FA84F;--deep:#1B7A3E;
    --font:'Open Sauce Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:#cfc9bd;display:grid;place-items:center;min-height:100vh;padding:24px}
  .frame{width:360px;height:740px;border-radius:38px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.35);border:1px solid #b8b2a5;position:relative}
  .splash{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:background .3s}
  .splash.cream{background:radial-gradient(120% 80% at 50% 40%, #ffffff 0%, var(--cream) 60%, #f1ece2 100%)}
  .splash.forest{background:radial-gradient(120% 80% at 50% 38%, #1c4a35 0%, #123524 42%, var(--forest) 100%)}
  .glow{position:absolute;top:40%;left:50%;width:320px;height:320px;border-radius:50%;
    transform:translate(-50%,-50%) scale(.2);opacity:0;filter:blur(8px);
    background:radial-gradient(circle, rgba(47,168,79,.40) 0%, rgba(126,211,33,.16) 40%, transparent 68%);
    animation:bloom 2.4s cubic-bezier(.22,1,.36,1) .15s forwards}
  @keyframes bloom{to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  .ring{position:absolute;top:40%;left:50%;width:130px;height:130px;border-radius:50%;
    border:1.5px solid rgba(47,168,79,.45);transform:translate(-50%,-50%) scale(.5);opacity:0}
  .splash.forest .ring{border-color:rgba(126,211,33,.5)}
  .ring.r1{animation:pulse 3.6s ease-out 1.1s infinite}
  .ring.r2{animation:pulse 3.6s ease-out 2.1s infinite}
  @keyframes pulse{0%{opacity:.5;transform:translate(-50%,-50%) scale(.5)}80%{opacity:0;transform:translate(-50%,-50%) scale(2.6)}100%{opacity:0}}
  .mark{position:relative;z-index:2;width:128px;height:128px;object-fit:contain;
    transform:scale(.6) rotate(-10deg);opacity:0;
    animation:wake 1.5s cubic-bezier(.34,1.56,.64,1) .35s forwards, breathe 3.8s ease-in-out 2s infinite;
    filter:drop-shadow(0 6px 16px rgba(47,168,79,.30))}
  @keyframes wake{0%{opacity:0;transform:scale(.6) rotate(-10deg)}60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes breathe{0%,100%{filter:drop-shadow(0 6px 14px rgba(47,168,79,.25))}50%{filter:drop-shadow(0 6px 26px rgba(47,168,79,.55))}}
  .word{z-index:2;margin-top:24px;font-size:32px;font-weight:700;letter-spacing:-.01em;
    opacity:0;transform:translateY(10px);animation:rise 1s ease-out 1.2s forwards}
  .splash.cream .word{color:#111}
  .splash.forest .word{color:var(--cream)}
  @keyframes rise{to{opacity:1;transform:none}}
  .divider{z-index:2;width:32px;height:3px;border-radius:3px;margin:16px 0 12px;
    background:linear-gradient(90deg,var(--lime),var(--deep));
    opacity:0;transform:scaleX(0);animation:grow 1s ease-out 1.5s forwards}
  @keyframes grow{to{opacity:1;transform:scaleX(1)}}
  .tag{z-index:2;font-size:13px;font-style:italic;letter-spacing:.02em;opacity:0;animation:fade 1.1s ease-out 1.7s forwards}
  .splash.cream .tag{color:#2FA84F}
  .splash.forest .tag{color:#9fdcae}
  @keyframes fade{to{opacity:1}}
  .load{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);display:flex;gap:7px;opacity:0;animation:fade 1s ease-out 2.1s forwards}
  .load i{width:7px;height:7px;border-radius:50%;background:rgba(47,168,79,.55);animation:blink 1.4s ease-in-out infinite}
  .splash.forest .load i{background:rgba(126,211,33,.6)}
  .load i:nth-child(2){animation-delay:.2s}.load i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  @media(prefers-reduced-motion:reduce){
    .glow,.mark,.word,.divider,.tag,.load{animation:none;opacity:1;transform:none}
    .ring{display:none}.mark{transform:scale(1) rotate(0)}.divider{transform:scaleX(1)}}
  .controls{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
  .controls button{background:var(--forest);color:var(--cream);border:0;border-radius:999px;padding:8px 14px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer}
  .controls button.alt{background:#fff;color:var(--forest);border:1px solid #bdb6a8}
  .caption{position:absolute;top:-30px;left:0;width:100%;text-align:center;font-size:12px;color:#5a544a}
</style>
</head>
