<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Close Eye — Founder's Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#0E2A1F; --forest2:#0A2018; --paper:#F7F6F1; --emerald:#06A94E; --sprout:#83C400;
  --mint:#B9E3C4; --sage:#6E8B79; --dim:rgba(247,246,241,.42);
  --sans:'Inter',system-ui,sans-serif; --serif:'Newsreader',Georgia,serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:var(--forest);color:var(--paper);font-family:var(--sans);overflow:hidden;
  background-image:radial-gradient(120% 90% at 50% 8%, #14392a 0%, var(--forest) 46%, var(--forest2) 100%);}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:7vh 8vw;}
.scene{max-width:760px;width:100%;opacity:0;transition:opacity .9s ease;}
.scene.show{opacity:1}
.kicker{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--sprout);
  margin-bottom:26px;opacity:0;transform:translateY(6px);transition:all .8s ease .1s;font-weight:600}
.kicker.on{opacity:1;transform:none}
.lines{display:flex;flex-direction:column;gap:16px}
.line{font-size:clamp(21px,3.3vw,32px);line-height:1.34;font-weight:500;letter-spacing:-.01em;
  color:var(--paper);opacity:0;transform:translateY(14px);filter:blur(6px);
  transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1),filter 1s;}
.line.past{opacity:.4;filter:blur(0)}
.line.active{opacity:1;transform:none;filter:blur(0)}
.line q,.line .q{font-style:italic;color:var(--mint);quotes:none}
/* title + closing accents */
.scene.title .line{font-weight:600}
.scene.title .line:last-child{font-family:var(--serif);font-style:italic;font-weight:400;
  font-size:clamp(30px,5.2vw,52px);color:var(--mint)}
.scene.closing .line.big{font-family:var(--serif);font-size:clamp(24px,3.6vw,34px)}
.hero-logo{display:flex;align-items:center;gap:12px;margin-bottom:34px;opacity:0;transform:translateY(6px);
  transition:all .8s ease}
.hero-logo.on{opacity:1;transform:none}
.hero-logo img{width:34px;height:34px}
.hero-logo b{font-weight:600;font-size:17px}
.enter-btn{margin-top:40px;display:inline-flex;align-items:center;gap:12px;background:var(--mint);
  color:var(--forest);border:none;border-radius:40px;padding:16px 30px;font-family:var(--sans);
  font-size:17px;font-weight:600;cursor:pointer;opacity:0;transform:translateY(10px);
  transition:all .7s ease;pointer-events:none}
.enter-btn.on{opacity:1;transform:none;pointer-events:auto}
.enter-btn:hover{background:#cdecd4}
/* progress rail */
#rail{position:fixed;left:22px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:9px;z-index:5}
#rail button{width:8px;height:8px;border-radius:50%;border:1px solid rgba(185,227,196,.5);background:transparent;
  padding:0;cursor:pointer;transition:all .3s}
#rail button.done{background:rgba(185,227,196,.5)}
#rail button.cur{background:var(--sprout);border-color:var(--sprout);transform:scale(1.5)}
/* top bar */
#top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
  padding:18px 22px;z-index:6;font-size:13px;color:var(--dim)}
#top .sc{letter-spacing:.16em;text-transform:uppercase;font-size:11px}
#skip{background:none;border:none;color:var(--dim);font-family:var(--sans);font-size:13px;cursor:pointer}
#skip:hover{color:var(--paper)}
/* audio dock */
#dock{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:6;display:flex;align-items:center;
  gap:6px;background:rgba(12,32,24,.72);backdrop-filter:blur(14px);border:1px solid rgba(185,227,196,.16);
  border-radius:40px;padding:9px 12px 9px 9px;box-shadow:0 10px 34px rgba(0,0,0,.34)}
.ic{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--paper);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.ic:hover{background:rgba(255,255,255,.08)}
.ic.main{background:var(--mint);color:var(--forest)}
.ic.main:hover{background:#cdecd4}
.ic svg{width:18px;height:18px;fill:currentColor}
.dock-label{font-size:12px;color:var(--dim);padding:0 12px 0 6px;white-space:nowrap}
.dock-label b{color:var(--mint);font-weight:500}
/* nav zones */
.nav{position:fixed;top:0;bottom:76px;width:22%;z-index:4;cursor:pointer;background:transparent}
#prevZone{left:0}#nextZone{right:0}
#hint{position:fixed;right:22px;bottom:92px;font-size:12px;color:var(--dim);z-index:5;transition:opacity .6s}
@media (max-width:640px){#rail{left:12px}.nav{bottom:88px}#stage{padding:9vh 7vw}}
@media (prefers-reduced-motion:reduce){.line,.scene,.kicker,.hero-logo,.enter-btn{transition:none!important;filter:none!important}}
</style>
</head>

const SCENES = [{"type": "title", "kicker": "Founder's Story", "lines": ["Hi.", "I'm Krishna.", "Not the Founder.", "Not the CEO.", "Just Krishna."]}, {"type": "scene", "kicker": "", "lines": ["Thank you for taking a few minutes to listen.", "Before I tell you about Close Eye,", "I want to tell you about one day that changed my life."]}, {"type": "scene", "kicker": "", "lines": ["A little while ago, on a June morning,", "my daughter was born.", "It was the happiest day of my life —", "and, unexpectedly, one of the loneliest."]}, {"type": "scene", "kicker": "", "lines": ["In that room there were only a few of us.", "My wife. Our newborn daughter.", "My sister-in-law, who never left our side.", "And my parents.", "Everyone else I loved was far away."]}, {"type": "scene", "kicker": "", "lines": ["There was no crowd outside the door.", "No phone buzzing every few minutes —", "“Is it a boy or a girl?”  “How's the baby?”", "For a few moments, everything went quiet."]}, {"type": "scene", "kicker": "", "lines": ["I held my daughter for the first time.", "I wanted to share that joy with the world.", "And I realised I had almost no one to call.", "For the first time, I understood", "what loneliness feels like", "in life's most precious moment."]}, {"type": "scene", "kicker": "", "lines": ["Then a thought came —", "the one every parent quietly carries.", "“What if something happens to me?”", "Her mother would always love her.", "Her grandparents would always protect her.", "But I wished there was something more."]}, {"type": "scene", "kicker": "", "lines": ["Not someone to replace family.", "Something to strengthen it.", "A trusted circle.", "A trusted presence.", "People who would stand beside her", "if life ever became hard."]}, {"type": "scene", "kicker": "", "lines": ["And I realised millions of families", "already live with this feeling.", "Parents growing old.", "Children living oceans away.", "Grandparents missing birthdays.", "Families separated by cities, by countries, by life.", "Every night, someone wonders,", "“Are they okay?”"]}, {"type": "scene", "kicker": "", "lines": ["That was the moment Close Eye", "stopped being a startup idea.", "It became my responsibility.", "Close Eye exists so that no family", "faces life's most important moments alone."]}, {"type": "scene", "kicker": "", "lines": ["We don't replace relationships. We strengthen them.", "We don't replace sons or daughters —", "we help them stay present, even across distance.", "We don't replace parents —", "we help families care for one another", "with dignity, trust, and compassion."]}, {"type": "scene", "kicker": "", "lines": ["Every visit. Every WhatsApp update.", "Every companion. Every conversation.", "Is a family trusting us.", "When you join Close Eye,", "you're not joining a startup.", "You're becoming someone's trusted presence."]}, {"type": "scene", "kicker": "", "lines": ["I made another promise that day.", "Close Eye should never exist only for its founders.", "It should grow with the people who build it.", "Think like an owner.", "Build with integrity.", "Protect trust.", "Because trust is never built by software.", "Trust is built by people."]}, {"type": "scene", "kicker": "Family Day", "lines": ["So every year, on the same June day,", "we won't only mark a company anniversary.", "We'll celebrate Family Day —", "a reminder of why Close Eye exists,", "that every request is a family,", "and that no technology replaces genuine human presence."]}, {"type": "scene", "kicker": "", "lines": ["One day, I hope you'll meet my daughter.", "Not because she's our brand —", "but because she reminds us why this matters:", "every child deserves grandparents,", "every grandparent deserves a grandchild's laughter,", "and every family deserves to stay close,", "no matter the distance."]}, {"type": "scene", "kicker": "", "lines": ["Thank you for believing in this mission.", "Thank you for becoming part of Close Eye.", "Together, let's build", "the world's most trusted presence network."]}, {"type": "closing", "kicker": "Before you enter the dashboard", "lines": ["I'd like you to remember one thing.", "Every notification you receive…", "Every phone call you answer…", "Every WhatsApp message you send…", "Every visit you coordinate…", "Every decision you make…", "Will represent someone's family.", "Someone will sleep peacefully tonight because of your work.", "That is our responsibility.", "That is our privilege.", "And that is why Close Eye exists.", "Close Eye doesn't replace relationships.", "It protects them.  It strengthens them.", "It helps them grow, even across distance.", "Welcome to Close Eye.", "Thank you for becoming someone's Trusted Presence."]}];

const stage=document.getElementById('stage'), rail=document.getElementById('rail'),
  counter=document.getElementById('counter'), hint=document.getElementById('hint'),
  playIcon=document.getElementById('playIcon');
let si=0, li=-1, playing=true, timer=null, sceneEl=null;
const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

// build rail
SCENES.forEach((s,i)=>{const b=document.createElement('button');b.onclick=()=>goScene(i);rail.appendChild(b);});

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function fmtLine(t){
  // italicise quoted phrases
  return esc(t).replace(/(“[^”]*”)/g,'<span class="q">$1</span>');
}
function renderScene(i){
  const s=SCENES[i];
  const el=document.createElement('div');
  el.className='scene '+ (s.type==='title'?'title':s.type==='closing'?'closing':'');
  let html='';
  if(s.type==='title'){html+='<div class="hero-logo"><img src="'+LOGO+'"/><b>close eye</b></div>';}
  if(s.kicker){html+='<div class="kicker">'+esc(s.kicker)+'</div>';}
  html+='<div class="lines">';
  s.lines.forEach((ln,k)=>{ const big = s.type==='closing' && /peacefully|Welcome to Close Eye/.test(ln);
    html+='<div class="line'+(big?' big':'')+'" data-i="'+k+'">'+fmtLine(ln)+'</div>';});
  html+='</div>';
  if(s.type==='closing'){html+='<button class="enter-btn" id="enterBtn">Enter the dashboard <span>→</span></button>';}
  el.innerHTML=html;
  return el;
}
function showScene(i){
  clearTimeout(timer);
  if(sceneEl){const old=sceneEl;old.classList.remove('show');setTimeout(()=>old.remove(),700);}
  si=i; li=-1;
  sceneEl=renderScene(i); stage.appendChild(sceneEl);
  requestAnimationFrame(()=>{sceneEl.classList.add('show');
    const k=sceneEl.querySelector('.kicker'); if(k)setTimeout(()=>k.classList.add('on'),120);
    const hl=sceneEl.querySelector('.hero-logo'); if(hl)setTimeout(()=>hl.classList.add('on'),120);
  });
  updateChrome();
  const startDelay = SCENES[i].type==='title'?700:520;
  timer=setTimeout(()=>{ if(playing) advanceLine(); }, startDelay);
}
function lineEls(){return sceneEl?[...sceneEl.querySelectorAll('.line')]:[];}
function advanceLine(){
  const L=lineEls();
  if(li>=0 && L[li]) L[li].classList.replace('active','past');
  li++;
  if(li>=L.length){ // scene fully revealed
    const btn=sceneEl.querySelector('#enterBtn'); if(btn)setTimeout(()=>btn.classList.add('on'),400);
    if(hint) hint.style.opacity=0;
    return;
  }
  const el=L[li]; el.classList.add('active');
  if(li===0 && hint && si>0) hint.style.opacity=0.0;
  const words=(SCENES[si].lines[li]||'').split(' ').length;
  const dwell=reduce?600:Math.max(1500, 760+words*250);
  if(playing) timer=setTimeout(advanceLine,dwell);
}
function tapNext(){
  clearTimeout(timer);
  const L=lineEls();
  if(li < L.length-1){ advanceLine(); if(playing){/*resume handled in advanceLine*/} }
  else { if(si<SCENES.length-1) showScene(si+1); }
}
function goScene(i){clearTimeout(timer); showScene(i);}
function updateChrome(){
  counter.textContent = (SCENES[si].type==='title'?'':'Scene '+si+' / '+(SCENES.length-1));
  [...rail.children].forEach((b,i)=>{b.className='';if(i<si)b.classList.add('done');if(i===si)b.classList.add('cur');});
  if(si>0 && hint){hint.style.opacity=0;}
}
function setPlay(p){
  playing=p;
  playIcon.innerHTML = p ? '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  if(p){clearTimeout(timer);timer=setTimeout(advanceLine,300);}
  else clearTimeout(timer);
}

document.getElementById('play').onclick=()=>setPlay(!playing);
document.getElementById('replay').onclick=()=>showScene(si);
document.getElementById('skipScene').onclick=()=>{ if(si<SCENES.length-1)showScene(si+1); };
document.getElementById('skip').onclick=()=>showScene(SCENES.length-1);
document.getElementById('nextZone').onclick=tapNext;
document.getElementById('prevZone').onclick=()=>{ if(si>0)showScene(si-1); };
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();setPlay(!playing);}
  else if(e.code==='ArrowRight')tapNext();
  else if(e.code==='ArrowLeft'){if(si>0)showScene(si-1);}
  else if(e.key.toLowerCase()==='r')showScene(si);
});
stage.addEventListener('click',e=>{ if(e.target.id==='enterBtn'){
  sceneEl.innerHTML='<div class="lines"><div class="line active" style="text-align:center">You\'re in. '+
  '<br><span class="q">Someone\'s peace of mind now depends on your work.</span></div></div>';
}});
setPlay(true); showScene(0);
setTimeout(()=>{if(hint&&si===0)hint.style.opacity=.7},2600);
</script>
