# Close Eye — iOS CI/CD  (runs on macOS runners — required for Xcode)
#
# Preview:    compile for a Simulator on every PR / push (no signing, no secrets)
# Production: signed archive → TestFlight on a version tag (needs the IOS_/APPSTORE_ secrets)
#
# NOTE: the app lives in the `closeeye-next/` subfolder, so run steps use
# `working-directory: closeeye-next` and ios/ paths resolve under it.

name: iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: closeeye-next

env:
  WORKSPACE: ios/App/App.xcworkspace
  SCHEME: App

jobs:
  build:
    runs-on: macos-15 # Xcode 16 / iOS 18 SDK
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # The app (and its lockfile) live in closeeye-next/, not the repo root —
          # without this, setup-node searches root, finds no lockfile, and fails.
          cache-dependency-path: closeeye-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      - name: CocoaPods
        working-directory: closeeye-next/ios/App
        run: pod install

      # ── Preview: unsigned Simulator build (PRs, branch pushes) — validates compile ──
      - name: Build for Simulator (no signing)
        if: github.ref_type != 'tag'
        run: |
          xcodebuild build \
            -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | xcpretty || true

      # ── Production: signed archive → TestFlight (version tags only) ──
      - name: Import signing certificate & profile
        if: github.ref_type == 'tag'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_B64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        if: github.ref_type == 'tag'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISION_PROFILE_B64 }}" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/closeeye.mobileprovision

      - name: Write ExportOptions.plist
        if: github.ref_type == 'tag'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key><dict>
              <key>in.closeeye.app</key><string>${{ secrets.IOS_PROVISION_PROFILE_NAME }}</string>
            </dict>
          </dict></plist>
          EOF

      - name: Archive
        if: github.ref_type == 'tag'
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/CloseEye.xcarchive" \
            DEVELOPMENT_TEAM=${{ secrets.IOS_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual | xcpretty || exit 1

      - name: Export IPA
        if: github.ref_type == 'tag'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/CloseEye.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" | xcpretty || exit 1

      - name: Upload to TestFlight
        if: github.ref_type == 'tag'
        env:
          API_PRIVATE_KEYS_DIR: ${{ runner.temp }}/private_keys
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          echo "${{ secrets.APPSTORE_API_KEY_B64 }}" | base64 -d > "$API_PRIVATE_KEYS_DIR/AuthKey_${KEY_ID}.p8"
          xcrun altool --upload-app -f "$RUNNER_TEMP/export/App.ipa" -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "${{ secrets.APPSTORE_API_ISSUER_ID }}"

      - name: Upload IPA artifact
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: closeeye-ios-ipa
          path: ${{ runner.temp }}/export/App.ipa
          if-no-files-found: error
