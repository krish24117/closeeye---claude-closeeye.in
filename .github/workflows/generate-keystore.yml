# Close Eye — one-shot upload-keystore generator
#
# Run this ONCE from the Actions tab (Run workflow ▶). It mints your Play **upload**
# key on the runner — no local JDK needed — and returns it as a short-lived artifact
# together with a strong generated password and copy-paste secret instructions.
#
# Security: the password is generated on the runner, masked in the logs, and written
# only into the artifact. The artifact self-deletes after 1 day — download it promptly,
# add the secrets, then keep closeeye-upload.jks + the password backed up offline.
# The upload key is resettable in Play if lost (Google holds the app-signing key).

name: Generate Upload Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: Key alias
        required: true
        default: closeeye-upload
      validity_days:
        description: Validity in days
        required: true
        default: '10000'
      dname:
        description: Certificate distinguished name
        required: true
        default: 'CN=Close Eye, OU=Mobile, O=Stexa Products & Services Pvt. Ltd., L=Hyderabad, ST=Telangana, C=IN'

permissions:
  contents: read

jobs:
  keystore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore + strong password
        env:
          ALIAS: ${{ inputs.alias }}
          VALIDITY: ${{ inputs.validity_days }}
          DNAME: ${{ inputs.dname }}
        run: |
          PW="$(openssl rand -hex 24)"          # 48 hex chars, shell-safe
          echo "::add-mask::$PW"                 # never print the password in logs

          keytool -genkeypair -v \
            -keystore closeeye-upload.jks \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity "$VALIDITY" -storetype JKS \
            -storepass "$PW" -keypass "$PW" \
            -dname "$DNAME"

          base64 -w0 closeeye-upload.jks > closeeye-upload.b64

          {
            echo "Close Eye — Play upload keystore (generated on CI)"
            echo "================================================="
            echo
            echo "Add these four repository secrets:"
            echo "  Settings > Secrets and variables > Actions > New repository secret"
            echo
            echo "  ANDROID_KEY_ALIAS          = $ALIAS"
            echo "  ANDROID_KEYSTORE_PASSWORD  = $PW"
            echo "  ANDROID_KEY_PASSWORD       = $PW"
            echo "  ANDROID_KEYSTORE_B64       = <paste the entire contents of closeeye-upload.b64>"
            echo
            echo "Then release a build:  git tag v1.0.0 && git push origin v1.0.0"
            echo
            echo "KEEP SAFE: back up closeeye-upload.jks and the password above offline."
            echo "This is the UPLOAD key. Google holds the app-signing key (Play App Signing)."
          } > KEYSTORE-README.txt

          # Job summary (no password) so you know what to do next.
          {
            echo "### Upload keystore generated ✅"
            echo ""
            echo "Download the **closeeye-upload-keystore** artifact below, open"
            echo "\`KEYSTORE-README.txt\` for the generated password, and add the four secrets."
            echo ""
            echo "> The artifact self-deletes in 1 day — grab it now."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload keystore bundle (self-deletes in 1 day)
        uses: actions/upload-artifact@v4
        with:
          name: closeeye-upload-keystore
          path: |
            closeeye-upload.jks
            closeeye-upload.b64
            KEYSTORE-README.txt
          if-no-files-found: error
          retention-days: 1
