name: Launch Validation

# Launch Validation Harness v1 — the reusable release gate. Runs the Playwright critical-journey
# smoke, axe accessibility, console-error detection and screenshot regression against the deployed
# UAT preview, plus Lighthouse CI (advisory in v1). Extend only when production experience proves
# it necessary.

on:
  workflow_dispatch:
  pull_request:
    branches: [main, feat/connect-launch]
  push:
    branches: [feat/connect-launch]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: closeeye-next
    env:
      VALIDATE_BASE_URL: https://connect.closeeye.in
      # Authenticated journeys run only if a test account secret is configured:
      PLAYWRIGHT_USER: ${{ secrets.PLAYWRIGHT_USER }}
      PLAYWRIGHT_PASS: ${{ secrets.PLAYWRIGHT_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: closeeye-next/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Playwright (smoke · a11y · visual)
        run: npx playwright test
      - name: Lighthouse CI (advisory)
        run: npx @lhci/cli autorun
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: closeeye-next/playwright-report
          retention-days: 14
