    <!-- App shell loading styles -->
    <style>
      html, body { margin: 0; overflow-x: hidden; }
      body { background: #fff; }
      #app-loader {
        position: fixed; inset: 0; z-index: 50;
        background: #fff;
        display: flex; flex-direction: column;
        transition: opacity 0.25s ease;
      }
      #app-loader.fade-out { opacity: 0; pointer-events: none; }
      #app-loader nav { padding-top: env(safe-area-inset-top, 0px); }
      @keyframes ce-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Neutral loading shell — same markup for every URL, no page-specific content -->
    <div id="app-loader">
      <nav style="border-bottom:1px solid #f3f4f6;padding:0 1.5rem;height:60px;display:flex;align-items:center;box-sizing:border-box;">
        <span style="font-family:Georgia,'Times New Roman',serif;font-size:1.1rem;color:#14532d;">close eye</span>
      </nav>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;">
        <div style="text-align:center;">
          <div style="width:28px;height:28px;border:2.5px solid #14532d;border-top-color:transparent;border-radius:50%;animation:ce-spin 0.75s linear infinite;margin:0 auto 12px;"></div>
          <p style="font-family:system-ui,sans-serif;font-size:0.75rem;color:#9ca3af;margin:0;">Loading…</p>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Remove the loading shell as soon as React mounts
      (function () {
        var root = document.getElementById('root');
        var loader = document.getElementById('app-loader');
        if (!root || !loader) return;
        var mo = new MutationObserver(function () {
          if (root.children.length > 0) {
            mo.disconnect();
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 260);
          }
        });
        mo.observe(root, { childList: true });
      })();

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
            .then(function (reg) { console.log('SW registered:', reg.scope); })
            .catch(function (err) { console.log('SW registration failed:', err); });
        });
      }
    </script>
  </body>
