    <!-- App shell loading styles — brand green (#0E2A1F) so it matches the
         native TWA/Android splash and there is NEVER a white flash while JS
         loads. The green background paints instantly, before any JS runs. -->
    <style>
      html, body { margin: 0; overflow-x: hidden; }
      body { background: #0E2A1F; }
      #app-loader {
        position: fixed; inset: 0; z-index: 50;
        background: #0E2A1F;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.25s ease;
      }
      #app-loader.fade-out { opacity: 0; pointer-events: none; }
      @keyframes ce-spin { to { transform: rotate(360deg); } }
    </style>

    <!-- Load safety net — runs BEFORE the deferred app module, so it catches
         errors thrown during module init (e.g. a missing env var) that would
         otherwise leave users staring at the spinner forever. -->
    <script>
      (function () {
        var mounted = false;
        window.__ceMounted = function () { mounted = true; };
        function fail(detail) {
          if (mounted) return;
          var loader = document.getElementById('app-loader');
          var target = loader || document.body;
          if (!target) return;
          target.innerHTML =
            '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0E2A1F;padding:24px;box-sizing:border-box;">' +
              '<div style="text-align:center;max-width:340px;font-family:system-ui,-apple-system,sans-serif;color:#fff;">' +
                '<p style="font-family:Georgia,serif;font-size:1.6rem;margin:0 0 12px;">close <span style="color:#86efac;">eye</span></p>' +
                '<p style="font-size:0.95rem;color:#d1fae5;margin:0 0 18px;line-height:1.5;">We had trouble loading the app. Please reload.</p>' +
                '<button onclick="location.reload()" style="background:#86efac;color:#0E2A1F;border:0;border-radius:10px;padding:11px 22px;font-weight:700;font-size:0.9rem;cursor:pointer;">Reload</button>' +
                (detail ? '<p style="font-size:0.62rem;color:#6f9082;margin:18px 0 0;word-break:break-word;">' + String(detail).slice(0, 300) + '</p>' : '') +
              '</div>' +
            '</div>';
        }
        window.addEventListener('error', function (e) {
          console.error('[closeeye] load error:', e.message, e.filename, e.lineno, e.error);
          fail((e.message || 'Script error') + (e.filename ? ' @ ' + String(e.filename).split('/').pop() + ':' + e.lineno : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          console.error('[closeeye] unhandled rejection:', r);
          fail((r && r.message) || String(r) || 'Load error');
        });
        // Watchdog: if React still hasn't mounted after 12s, offer a reload.
        setTimeout(function () {
          var root = document.getElementById('root');
          if (!mounted && (!root || root.children.length === 0)) {
            fail('Timed out while loading. Check your connection and reload.');
          }
        }, 12000);
      })();
    </script>

    <script>
      // Remove the loading shell as soon as React mounts
      (function () {
        var root = document.getElementById('root');
        var loader = document.getElementById('app-loader');
        if (!root || !loader) return;
        var mo = new MutationObserver(function () {
          if (root.children.length > 0) {
            mo.disconnect();
            if (window.__ceMounted) window.__ceMounted();
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 260);
          }
        });
        mo.observe(root, { childList: true });
      })();

      // Android install prompt — capture before React mounts (the event fires
      // early and is gone if not caught). Exposed as window.__ceInstallPrompt
      // so the IOSInstallBanner component can call .prompt() on demand.
      window.__ceInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__ceInstallPrompt = e;
        window.dispatchEvent(new CustomEvent('ce-install-ready'));
      });
      window.addEventListener('appinstalled', function () {
        window.__ceInstallPrompt = null;
      });

      // Register Service Worker + auto-update so new deploys show up without
      // users clearing cache.
      if ('serviceWorker' in navigator) {
        // When a new SW takes control after an update, reload once to pick up
        // the fresh assets. Only if a controller already existed (i.e. this is
        // an UPDATE, not a first install) so first-time visitors don't reload.
        if (navigator.serviceWorker.controller) {
          var ceRefreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (ceRefreshing) return;
            ceRefreshing = true;
            window.location.reload();
          });
        }
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
            .then(function (reg) {
              console.log('SW registered:', reg.scope);
              reg.update();
              // Re-check for a new version whenever the app regains focus
              // (handles installed PWAs that stay open for a long time).
              document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') reg.update();
              });
            })
            .catch(function (err) { console.log('SW registration failed:', err); });
        });
      }
    </script>
